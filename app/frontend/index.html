<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Unicare Hospital Management</title>
<script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Plus Jakarta Sans',sans-serif;background:#f8fafc}

/* ── Animations ── */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
.fade-in{animation:fadeIn .4s ease}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}

/* ── AUTH ── */
.auth-bg{
  min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;
  background:linear-gradient(135deg,#0f172a 0%,#1e1b4b 55%,#0f172a 100%);
}
.auth-card{
  width:100%;max-width:440px;
  background:rgba(255,255,255,.08);backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.15);border-radius:20px;padding:28px;
}
.auth-logo{
  width:64px;height:64px;border-radius:16px;margin:0 auto 16px;
  background:linear-gradient(135deg,#6366f1,#9333ea);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 8px 24px rgba(99,102,241,.35);
}
.auth-input{
  width:100%;padding:12px 16px;border-radius:12px;font-size:14px;font-family:inherit;
  background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);
  color:#fff;outline:none;transition:border-color .2s,box-shadow .2s;
}
.auth-input::placeholder{color:rgba(255,255,255,.4)}
.auth-input:focus{border-color:#818cf8;box-shadow:0 0 0 3px rgba(99,102,241,.25)}
.auth-input option{color:#1e293b;background:#fff}
.auth-label{display:block;font-size:13px;font-weight:600;color:#fff;margin-bottom:8px}
.auth-btn{
  width:100%;padding:13px;border:none;border-radius:12px;cursor:pointer;font-size:14px;
  font-weight:700;font-family:inherit;color:#fff;
  background:linear-gradient(135deg,#6366f1,#9333ea);
  transition:opacity .2s,transform .2s,box-shadow .2s;
}
.auth-btn:hover{opacity:.92;box-shadow:0 6px 20px rgba(99,102,241,.4)}
.auth-btn:active{transform:scale(.98)}
.auth-btn:disabled{opacity:.6;cursor:not-allowed}
.auth-link{
  width:100%;background:none;border:none;cursor:pointer;font-family:inherit;
  font-size:13px;font-weight:500;color:#a5b4fc;text-align:center;
  transition:color .2s;padding:4px;
}
.auth-link:hover{color:#fff}
.auth-error{
  background:rgba(239,68,68,.18);border:1px solid rgba(239,68,68,.3);
  border-radius:12px;padding:12px;font-size:13px;color:#fca5a5;
  animation:slideDown .3s ease;
}
.spinner{
  width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;
  border-radius:50%;display:inline-block;vertical-align:middle;margin-right:8px;
  animation:spin .7s linear infinite;
}

/* ── DASHBOARD LAYOUT ── */
#dashboard{display:flex;height:100vh;overflow:hidden}

/* ── SIDEBAR ── */
.sidebar{
  width:260px;flex-shrink:0;display:flex;flex-direction:column;overflow:hidden;
  background:linear-gradient(180deg,#0f172a 0%,#1e293b 50%,#0f172a 100%);
  border-right:1px solid rgba(255,255,255,.06);
}
.sidebar-brand{padding:20px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:12px}
.sidebar-brand-icon{
  width:40px;height:40px;border-radius:12px;flex-shrink:0;
  background:linear-gradient(135deg,#6366f1,#9333ea);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 12px rgba(99,102,241,.3);
}
.sidebar-brand h1{font-size:17px;font-weight:800;color:#fff;line-height:1.2}
.sidebar-brand p{font-size:10px;color:#64748b;text-transform:uppercase;letter-spacing:.08em}
.sidebar-nav{flex:1;padding:12px;overflow-y:auto;display:flex;flex-direction:column;gap:2px}
.nav-btn{
  width:100%;display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:12px;
  border:none;cursor:pointer;font-family:inherit;font-size:13px;font-weight:500;
  background:transparent;color:rgba(255,255,255,.5);text-align:left;
  transition:background .2s,color .2s;
}
.nav-btn:hover{background:rgba(255,255,255,.08);color:rgba(255,255,255,.85)}
.nav-btn.active{background:rgba(255,255,255,.1);color:#fff}
.sidebar-footer{padding:16px;border-top:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:10px}
.footer-avatar{
  width:36px;height:36px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,#10b981,#34d399);
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:700;color:#fff;
}
.footer-name{font-size:13px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.footer-role{font-size:11px;color:#64748b}
.logout-btn{
  margin-left:auto;background:none;border:none;cursor:pointer;
  color:#475569;padding:4px;border-radius:6px;transition:color .2s;display:flex;
}
.logout-btn:hover{color:#fff}

/* ── MAIN ── */
.main-area{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden}
.main-header{
  padding:16px 24px;border-bottom:1px solid #e2e8f0;
  background:rgba(255,255,255,.85);backdrop-filter:blur(12px);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
  position:sticky;top:0;z-index:10;
}
.main-header h2{font-size:20px;font-weight:800;color:#0f172a}
.main-header p{font-size:12px;color:#94a3b8;margin-top:2px}
.page-content{flex:1;overflow-y:auto;padding:24px}

/* ── STAT CARDS ── */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:20px}
.stat-card{
  border-radius:18px;padding:20px;color:#fff;position:relative;overflow:hidden;
  cursor:default;transition:transform .3s,box-shadow .3s;
}
.stat-card:hover{transform:translateY(-3px);box-shadow:0 16px 40px rgba(0,0,0,.15)}
.stat-card-circle{
  position:absolute;top:-24px;right:-24px;width:96px;height:96px;
  border-radius:50%;background:rgba(255,255,255,.12);
}
.s1{background:linear-gradient(135deg,#6366f1,#8b5cf6)}
.s2{background:linear-gradient(135deg,#06b6d4,#0ea5e9)}
.s3{background:linear-gradient(135deg,#f59e0b,#f97316)}
.s4{background:linear-gradient(135deg,#10b981,#34d399)}
.stat-icon{
  width:40px;height:40px;border-radius:10px;background:rgba(255,255,255,.2);
  display:flex;align-items:center;justify-content:center;margin-bottom:12px;
}
.stat-value{font-size:28px;font-weight:800;line-height:1}
.stat-label{font-size:13px;color:rgba(255,255,255,.7);margin-top:4px}
.stat-badge{
  position:absolute;top:16px;right:16px;
  background:rgba(255,255,255,.2);border-radius:8px;padding:3px 8px;
  font-size:11px;font-weight:600;
}

/* ── CONTENT CARDS ── */
.content-card{
  background:#fff;border-radius:18px;border:1px solid rgba(226,232,240,.7);
  overflow:hidden;transition:box-shadow .3s;
}
.content-card:hover{box-shadow:0 8px 28px rgba(0,0,0,.06)}
.card-header{padding:20px 24px 16px;display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:15px;font-weight:700;color:#0f172a}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:0}

/* ── TABLE ── */
.data-table{width:100%;border-collapse:collapse}
.data-table thead{background:#f8fafc}
.data-table th{
  padding:14px 20px;text-align:left;font-size:11px;font-weight:700;
  color:#64748b;text-transform:uppercase;letter-spacing:.06em;
  border-bottom:1px solid rgba(226,232,240,.7);
}
.data-table td{padding:14px 20px;border-bottom:1px solid rgba(226,232,240,.5);font-size:13px;color:#334155}
.data-table tbody tr{transition:background .15s}
.data-table tbody tr:hover{background:#f8fafc}
.data-table tbody tr:last-child td{border-bottom:none}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.badge-green{background:#dcfce7;color:#15803d}
.badge-red{background:#fee2e2;color:#dc2626}
.badge-blue{background:#dbeafe;color:#1d4ed8}
.badge-yellow{background:#fef9c3;color:#a16207}
.badge-orange{background:#ffedd5;color:#c2410c}

/* ── DOCTOR CARDS ── */
.doctor-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
.doctor-card{
  background:#fff;border-radius:18px;border:1px solid rgba(226,232,240,.7);
  padding:20px;transition:transform .3s,box-shadow .3s;
}
.doctor-card:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(0,0,0,.08)}
.doc-avatar{
  width:48px;height:48px;border-radius:14px;
  background:linear-gradient(135deg,#3b82f6,#6366f1);
  display:flex;align-items:center;justify-content:center;
  font-size:20px;font-weight:800;color:#fff;flex-shrink:0;
}
.doc-info{flex:1;min-width:0}
.doc-name{font-size:14px;font-weight:700;color:#0f172a}
.doc-spec{font-size:12px;color:#94a3b8;margin-top:2px}
.doc-meta{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:16px;padding-top:16px;border-top:1px solid rgba(226,232,240,.6)}
.doc-meta-item p:first-child{font-size:11px;color:#94a3b8;margin-bottom:2px}
.doc-meta-item p:last-child{font-size:14px;font-weight:700;color:#0f172a}

/* ── DEPARTMENT CARDS ── */
.dept-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.dept-card{
  background:#fff;border-radius:18px;border:1px solid rgba(226,232,240,.7);
  padding:20px;transition:transform .3s,box-shadow .3s;
}
.dept-card:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(0,0,0,.08)}
.dept-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.dept-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:16px 0}
.dept-stat{background:#f8fafc;border-radius:10px;padding:8px;text-align:center}
.dept-stat-val{font-size:18px;font-weight:800;color:#0f172a}
.dept-stat-lbl{font-size:10px;color:#94a3b8;margin-top:2px}
.progress-track{height:8px;background:#f1f5f9;border-radius:4px;overflow:hidden}
.progress-fill{height:100%;border-radius:4px;transition:width 1s ease}

/* ── MODAL ── */
.modal-bg{
  display:none;position:fixed;inset:0;z-index:50;
  background:rgba(15,23,42,.5);backdrop-filter:blur(4px);
  align-items:center;justify-content:center;padding:16px;
}
.modal-bg.open{display:flex}
.modal-box{background:#fff;border-radius:20px;box-shadow:0 24px 64px rgba(0,0,0,.15);width:100%;max-width:520px;max-height:90vh;overflow-y:auto}

/* ── TOAST ── */
#toast-wrap{position:fixed;top:16px;right:16px;z-index:60;display:flex;flex-direction:column;gap:8px}
.toast{
  padding:12px 18px;border-radius:14px;font-size:13px;font-weight:600;color:#fff;
  box-shadow:0 8px 24px rgba(0,0,0,.15);animation:slideDown .3s ease;
}
.toast-success{background:linear-gradient(135deg,#10b981,#059669)}
.toast-error{background:linear-gradient(135deg,#ef4444,#dc2626)}
.toast-info{background:linear-gradient(135deg,#6366f1,#4f46e5)}

/* ── USER LIST ITEM ── */
.user-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px;border-radius:12px;background:#f8fafc;
  transition:background .15s;
}
.user-item:hover{background:#f1f5f9}
.user-mini-avatar{
  width:32px;height:32px;border-radius:50%;flex-shrink:0;
  background:#e0e7ff;color:#4f46e5;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;
}

/* ── DEPARTMENT PROGRESS ── */
.dept-progress-item{margin-bottom:12px}
.dept-progress-item:last-child{margin-bottom:0}

/* visibility helpers */
.hidden{display:none!important}
</style>
</head>
<body>

<!-- ═══════════════════ AUTH ═══════════════════ -->
<div id="auth">

  <!-- LOGIN -->
  <div id="login-screen" class="auth-bg">
    <div style="width:100%;max-width:440px;">
      <div style="text-align:center;margin-bottom:28px;">
        <div class="auth-logo"><i data-lucide="stethoscope" style="width:32px;height:32px;color:#fff;"></i></div>
        <h1 style="font-size:28px;font-weight:800;color:#fff;margin-bottom:6px;">Unicare</h1>
        <p style="color:#a5b4fc;font-size:14px;">Hospital Management System</p>
      </div>
      <div class="auth-card">
        <div style="margin-bottom:16px;">
          <label class="auth-label">Email</label>
          <input id="li-email" type="email" class="auth-input" placeholder="your@email.com" autocomplete="email"/>
        </div>
        <div style="margin-bottom:16px;">
          <label class="auth-label">Password</label>
          <input id="li-pass" type="password" class="auth-input" placeholder="••••••••" autocomplete="current-password"/>
        </div>
        <div id="li-err" class="auth-error hidden" style="margin-bottom:14px;"></div>
        <button id="li-btn" class="auth-btn" onclick="doLogin()">Sign In</button>
        <div style="text-align:center;margin-top:12px;">
          <button class="auth-link" onclick="showScreen('register')">Don't have an account? Register</button>
        </div>
        <p style="text-align:center;font-size:12px;color:rgba(165,180,252,.6);margin-top:10px;">
          Demo: <strong style="color:#a5b4fc;">admin@unicare.com</strong> / <strong style="color:#a5b4fc;">admin123</strong>
        </p>
      </div>
    </div>
  </div>

  <!-- REGISTER -->
  <div id="register-screen" class="auth-bg hidden">
    <div style="width:100%;max-width:440px;">
      <div style="text-align:center;margin-bottom:28px;">
        <h1 style="font-size:28px;font-weight:800;color:#fff;margin-bottom:6px;">Create Account</h1>
        <p style="color:#a5b4fc;font-size:14px;">Join Unicare Hospital</p>
      </div>
      <div class="auth-card">
        <div style="margin-bottom:14px;">
          <label class="auth-label">Full Name</label>
          <input id="rg-name" type="text" class="auth-input" placeholder="John Doe"/>
        </div>
        <div style="margin-bottom:14px;">
          <label class="auth-label">Email</label>
          <input id="rg-email" type="email" class="auth-input" placeholder="your@email.com"/>
        </div>
        <div style="margin-bottom:14px;">
          <label class="auth-label">Password</label>
          <input id="rg-pass" type="password" class="auth-input" placeholder="Minimum 6 characters"/>
        </div>
        <div style="margin-bottom:14px;">
          <label class="auth-label">Role</label>
          <select id="rg-role" class="auth-input">
            <option value="Doctor">Doctor</option>
            <option value="Nurse">Nurse</option>
            <option value="Admin">Admin</option>
            <option value="Staff">Staff</option>
          </select>
        </div>
        <div style="margin-bottom:16px;">
          <label class="auth-label">Department</label>
          <input id="rg-dept" type="text" class="auth-input" placeholder="e.g. Cardiology"/>
        </div>
        <div id="rg-err" class="auth-error hidden" style="margin-bottom:14px;"></div>
        <button id="rg-btn" class="auth-btn" onclick="doRegister()">Create Account</button>
        <div style="text-align:center;margin-top:12px;">
          <button class="auth-link" onclick="showScreen('login')">Already have an account? Sign In</button>
        </div>
      </div>
    </div>
  </div>

</div><!-- /#auth -->

<!-- ═══════════════════ DASHBOARD ═══════════════════ -->
<div id="dashboard" class="hidden">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="sidebar-brand-icon">
        <i data-lucide="stethoscope" style="width:22px;height:22px;color:#fff;"></i>
      </div>
      <div>
        <h1>Unicare</h1>
        <p>Hospital Management</p>
      </div>
    </div>

    <nav class="sidebar-nav">
      <button class="nav-btn active" data-page="overview"     onclick="goPage('overview')">
        <i data-lucide="layout-dashboard" style="width:18px;height:18px;"></i> Dashboard
      </button>
      <button class="nav-btn"           data-page="patients"     onclick="goPage('patients')">
        <i data-lucide="users"           style="width:18px;height:18px;"></i> Patients
      </button>
      <button class="nav-btn"           data-page="doctors"      onclick="goPage('doctors')">
        <i data-lucide="stethoscope"     style="width:18px;height:18px;"></i> Doctors
      </button>
      <button class="nav-btn"           data-page="appointments" onclick="goPage('appointments')">
        <i data-lucide="calendar-check"  style="width:18px;height:18px;"></i> Appointments
      </button>
      <button class="nav-btn"           data-page="departments"  onclick="goPage('departments')">
        <i data-lucide="building-2"      style="width:18px;height:18px;"></i> Departments
      </button>
    </nav>

    <div class="sidebar-footer">
      <div id="sb-avatar" class="footer-avatar">A</div>
      <div style="flex:1;min-width:0;">
        <div id="sb-name" class="footer-name">User</div>
        <div id="sb-role" class="footer-role">Role</div>
      </div>
      <button class="logout-btn" onclick="doLogout()" title="Logout">
        <i data-lucide="log-out" style="width:16px;height:16px;"></i>
      </button>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main-area">
    <header class="main-header">
      <div>
        <h2 id="page-title">Dashboard</h2>
        <p id="page-sub">Welcome back</p>
      </div>
    </header>
    <div id="page-content" class="page-content fade-in"></div>
  </div>

</div><!-- /#dashboard -->

<!-- MODAL -->
<div id="modal" class="modal-bg" onclick="if(event.target===this)closeModal()">
  <div id="modal-inner" class="modal-box"></div>
</div>

<!-- TOAST -->
<div id="toast-wrap"></div>

<script>
/* ══════════════════════════════════════════════
   DATA

  {id:'D002',name:'Dr. Neha Gupta',   specialty:'Orthopedics',   exp:'8 years',  patients:18, available:true},

  {id:'D004',name:'Dr. Meena Das',    specialty:'Endocrinology', exp:'10 years', patients:16, available:true},

  {id:'A002',patient:'Priya Sharma', doctor:'Dr. Neha Gupta',   date:'2024-01-23',time:'2:00 PM', status:'Pending',   dept:'Orthopedics'},

  {id:'A004',patient:'Karan Mehta',  doctor:'Dr. Rohit Bose',   date:'2024-01-25',time:'9:00 AM', status:'Pending',   dept:'Emergency'},

/* ── storage ── */
function loadUsers(){try{return JSON.parse(localStorage.getItem(STORE)||'[]')}catch{return[]}}
function saveUsers(u){localStorage.setItem(STORE,JSON.stringify(u))}

// seed demo admin
(function(){
  const u=loadUsers();
  if(!u.find(x=>x.email==='admin@unicare.com')){
    u.push({id:'USR-DEMO',email:'admin@unicare.com',password:'admin123',name:'Admin User',role:'Admin',dept:'Administration',created:new Date().toISOString()});
    saveUsers(u);
  }
})();

let currentUser=null;
let currentPage='overview';

/* ══════════════════════════════════════════════
   TOAST
══════════════════════════════════════════════ */
function toast(msg,type='info'){
  const wrap=document.getElementById('toast-wrap');
  const t=document.createElement('div');
  t.className='toast toast-'+type;
  t.textContent=msg;
  wrap.appendChild(t);
  setTimeout(()=>t.remove(),3000);
}

/* ══════════════════════════════════════════════
   MODAL
══════════════════════════════════════════════ */
function openModal(html){
  document.getElementById('modal-inner').innerHTML=html;
  document.getElementById('modal').classList.add('open');
  lucide.createIcons();
}
function closeModal(){document.getElementById('modal').classList.remove('open')}

/* ══════════════════════════════════════════════
   AUTH SCREENS
══════════════════════════════════════════════ */
function showScreen(s){
  document.getElementById('login-screen').classList.toggle('hidden', s!=='login');
  document.getElementById('register-screen').classList.toggle('hidden', s!=='register');
}

function setBtnLoading(id,loading,label){
  const b=document.getElementById(id);
  b.disabled=loading;
  b.innerHTML=loading?`<span class="spinner"></span>Please wait…`:label;
}

function showErr(id,msg){
  const el=document.getElementById(id);
  el.textContent=msg;
  el.classList.remove('hidden');
  setTimeout(()=>el.classList.add('hidden'),4000);
}

function doLogin(){
  const email=document.getElementById('li-email').value.trim().toLowerCase();
  const pass =document.getElementById('li-pass').value;
  if(!email||!pass){showErr('li-err','Please fill in all fields.');return;}
  setBtnLoading('li-btn',true,'Sign In');
  setTimeout(()=>{
    const users=loadUsers();
    const user=users.find(u=>u.email.toLowerCase()===email&&u.password===pass);
    setBtnLoading('li-btn',false,'Sign In');
    if(!user){showErr('li-err','Invalid email or password.');return;}
    currentUser=user;
    localStorage.setItem(SESS,user.id);
    toast('Welcome, '+user.name+'!','success');
    enterDashboard();
  },400);
}

function doRegister(){
  const name=document.getElementById('rg-name').value.trim();
  const email=document.getElementById('rg-email').value.trim().toLowerCase();
  const pass =document.getElementById('rg-pass').value;
  const role =document.getElementById('rg-role').value;
  const dept =document.getElementById('rg-dept').value.trim();
  if(!name||!email||!pass||!dept){showErr('rg-err','All fields are required.');return;}
  if(pass.length<6){showErr('rg-err','Password must be at least 6 characters.');return;}
  setBtnLoading('rg-btn',true,'Create Account');
  setTimeout(()=>{
    const users=loadUsers();
    if(users.find(u=>u.email.toLowerCase()===email)){
      showErr('rg-err','Email already registered.');
      setBtnLoading('rg-btn',false,'Create Account');
      return;
    }
    users.push({id:'USR-'+Date.now(),email,password:pass,name,role,dept,created:new Date().toISOString()});
    saveUsers(users);
    setBtnLoading('rg-btn',false,'Create Account');
    toast('Account created! Please sign in.','success');
    document.getElementById('rg-name').value='';
    document.getElementById('rg-email').value='';
    document.getElementById('rg-pass').value='';
    document.getElementById('rg-dept').value='';
    showScreen('login');
  },500);
}

function enterDashboard(){
  document.getElementById('auth').classList.add('hidden');
  document.getElementById('dashboard').classList.remove('hidden');
  document.getElementById('sb-avatar').textContent=(currentUser.name||'?')[0].toUpperCase();
  document.getElementById('sb-name').textContent=currentUser.name;
  document.getElementById('sb-role').textContent=currentUser.role;
  document.getElementById('page-sub').textContent='Welcome back, '+currentUser.name;
  renderPage();
  lucide.createIcons();
}

function doLogout(){
  currentUser=null;
  localStorage.removeItem(SESS);
  document.getElementById('auth').classList.remove('hidden');
  document.getElementById('dashboard').classList.add('hidden');
  document.getElementById('li-email').value='';
  document.getElementById('li-pass').value='';
  showScreen('login');
  toast('Logged out successfully','info');
  lucide.createIcons();
}

/* ══════════════════════════════════════════════
   ROUTING
══════════════════════════════════════════════ */
const PAGE_TITLES={overview:'Dashboard',patients:'Patients',doctors:'Doctors',appointments:'Appointments',departments:'Departments'};

function goPage(p){
  currentPage=p;
  document.querySelectorAll('.nav-btn').forEach(b=>{
    b.classList.toggle('active', b.dataset.page===p);
  });
  document.getElementById('page-title').textContent=PAGE_TITLES[p]||p;
  renderPage();
}

function renderPage(){
  const el=document.getElementById('page-content');
  el.classList.remove('fade-in');
  void el.offsetWidth;
  el.classList.add('fade-in');
  ({overview:renderOverview,patients:renderPatients,doctors:renderDoctors,appointments:renderAppointments,departments:renderDepartments}[currentPage]||renderOverview)(el);
  lucide.createIcons();
}

/* ══════════════════════════════════════════════
   PAGES — all use inline CSS, no Tailwind
══════════════════════════════════════════════ */

/* ── helpers ── */
function initials(name){return(name||'?')[0].toUpperCase()}
function pAvatar(name,bg='#e0e7ff',fg='#4f46e5'){
  return `<div style="width:32px;height:32px;border-radius:50%;background:${bg};color:${fg};display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;">${initials(name)}</div>`;
}

/* ── OVERVIEW ── */
function renderOverview(el){
  const users=loadUsers();
  const totalDocs=DEPARTMENTS.reduce((s,d)=>s+d.doctors,0);
  const totalBeds=DEPARTMENTS.reduce((s,d)=>s+d.beds,0);

  const stats=[
    {label:'Active Users',  value:users.length, note:'Registered', icon:'users',          cls:'s1'},
    {label:'Departments',   value:DEPARTMENTS.length, note:'Active', icon:'building-2',   cls:'s2'},
    {label:'Total Doctors', value:totalDocs,     note:'On Staff',   icon:'stethoscope',    cls:'s3'},
    {label:'Total Beds',    value:totalBeds,     note:'Available',  icon:'bed-double',     cls:'s4'},
  ];

  const statCards=stats.map(s=>`
    <div class="stat-card ${s.cls}">
      <div class="stat-card-circle"></div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
        <div class="stat-icon"><i data-lucide="${s.icon}" style="width:20px;height:20px;color:#fff;"></i></div>
        <span class="stat-badge">${s.note}</span>
      </div>
      <div class="stat-value">${s.value}</div>
      <div class="stat-label">${s.label}</div>
    </div>
  `).join('');

  const userRows=users.slice(0,5).map(u=>`
    <div class="user-item">
      <div style="display:flex;align-items:center;gap:10px;">
        ${pAvatar(u.name)}
        <div>
          <div style="font-size:13px;font-weight:600;color:#0f172a;">${u.name}</div>
          <div style="font-size:11px;color:#94a3b8;">${u.role}</div>
        </div>
      </div>
      <span class="badge badge-green">Active</span>
    </div>
  `).join('');

  const deptBars=DEPARTMENTS.slice(0,4).map(d=>`
    <div class="dept-progress-item">
      <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px;">
        <span style="font-weight:600;color:#334155;">${d.name}</span>
        <span style="font-weight:700;color:${d.color};">${d.occupancy}%</span>
      </div>
      <div class="progress-track"><div class="progress-fill" style="width:${d.occupancy}%;background:${d.color};"></div></div>
    </div>
  `).join('');

  el.innerHTML=`
    <div class="stat-grid">${statCards}</div>
    <div class="two-col">
      <div class="content-card">
        <div class="card-header"><span class="card-title">Active Users</span></div>
        <div style="padding:0 16px 16px;display:flex;flex-direction:column;gap:6px;">${userRows||'<p style="color:#94a3b8;font-size:13px;padding:8px;">No users yet.</p>'}</div>
      </div>
      <div class="content-card">
        <div class="card-header"><span class="card-title">Department Occupancy</span></div>
        <div style="padding:0 20px 20px;">${deptBars}</div>
      </div>
    </div>
  `;
}

/* ── PATIENTS ── */
function renderPatients(el){
  const statusBadge=s=>{
    if(s==='Admitted')    return '<span class="badge badge-red">Admitted</span>';
    if(s==='In Recovery') return '<span class="badge badge-yellow">In Recovery</span>';
    return '<span class="badge badge-green">Discharged</span>';
  };
  const rows=PATIENTS.map(p=>`
    <tr>
      <td>
        <div style="display:flex;align-items:center;gap:10px;">
          ${pAvatar(p.name)}
          <div>
            <div style="font-weight:600;color:#0f172a;">${p.name}</div>
            <div style="font-size:11px;color:#94a3b8;">${p.id}</div>
          </div>
        </div>
      </td>
      <td style="font-weight:600;">${p.age}</td>
      <td>${p.condition}</td>
      <td>${p.dept}</td>
      <td>${statusBadge(p.status)}</td>
      <td>${p.date}</td>
    </tr>
  `).join('');

  el.innerHTML=`
    <div class="content-card">
      <div class="card-header">
        <span class="card-title">All Patients</span>
        <span class="badge badge-blue">${PATIENTS.length} total</span>
      </div>
      <div style="overflow-x:auto;">
        <table class="data-table">
          <thead>
            <tr>
              <th>Patient</th><th>Age</th><th>Condition</th>
              <th>Department</th><th>Status</th><th>Admitted</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>
  `;
}

/* ── DOCTORS ── */
function renderDoctors(el){
  const cards=DOCTORS.map(d=>`
    <div class="doctor-card">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;">
        <div style="display:flex;align-items:center;gap:12px;">
          <div class="doc-avatar">${d.name[4]||'D'}</div>
          <div class="doc-info">
            <div class="doc-name">${d.name}</div>
            <div class="doc-spec">${d.specialty}</div>
          </div>
        </div>
        <span class="badge ${d.available?'badge-green':'badge-red'}">${d.available?'Available':'Busy'}</span>
      </div>
      <div class="doc-meta">
        <div class="doc-meta-item"><p>Experience</p><p>${d.exp}</p></div>
        <div class="doc-meta-item"><p>Patients</p><p>${d.patients}</p></div>
      </div>
    </div>
  `).join('');

  el.innerHTML=`<div class="doctor-grid">${cards}</div>`;
}

/* ── APPOINTMENTS ── */
function renderAppointments(el){
  const statusBadge=s=>s==='Confirmed'
    ?'<span class="badge badge-blue">Confirmed</span>'
    :'<span class="badge badge-yellow">Pending</span>';

  const rows=APPOINTMENTS.map(a=>`
    <tr>
      <td>
        <div style="font-weight:600;color:#0f172a;">${a.patient}</div>
        <div style="font-size:11px;color:#94a3b8;">${a.id}</div>
      </td>
      <td>${a.doctor}</td>
      <td>
        <div style="display:flex;align-items:center;gap:6px;">
          <i data-lucide="calendar" style="width:14px;height:14px;color:#94a3b8;flex-shrink:0;"></i>
          <span>${a.date} · ${a.time}</span>
        </div>
      </td>
      <td>${a.dept}</td>
      <td>${statusBadge(a.status)}</td>
    </tr>
  `).join('');

  el.innerHTML=`
    <div class="content-card">
      <div class="card-header">
        <span class="card-title">All Appointments</span>
        <span class="badge badge-blue">${APPOINTMENTS.length} total</span>
      </div>
      <div style="overflow-x:auto;">
        <table class="data-table">
          <thead>
            <tr><th>Patient</th><th>Doctor</th><th>Date &amp; Time</th><th>Department</th><th>Status</th></tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>
  `;
}

/* ── DEPARTMENTS ── */
function renderDepartments(el){
  const cards=DEPARTMENTS.map(d=>`
    <div class="dept-card">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:4px;">
        <div class="dept-icon" style="background:${d.color}18;color:${d.color};">
          <i data-lucide="building-2" style="width:20px;height:20px;"></i>
        </div>
        <div>
          <div style="font-size:14px;font-weight:700;color:#0f172a;">${d.name}</div>
          <div style="font-size:12px;color:#94a3b8;">${d.head}</div>
        </div>
      </div>
      <div class="dept-stats">
        <div class="dept-stat"><div class="dept-stat-val">${d.doctors}</div><div class="dept-stat-lbl">Doctors</div></div>
        <div class="dept-stat"><div class="dept-stat-val">${d.beds}</div><div class="dept-stat-lbl">Beds</div></div>
        <div class="dept-stat"><div class="dept-stat-val">${d.patients}</div><div class="dept-stat-lbl">Patients</div></div>
      </div>
      <div>
        <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px;">
          <span style="color:#64748b;">Occupancy</span>
          <span style="font-weight:700;color:${d.color};">${d.occupancy}%</span>
        </div>
        <div class="progress-track"><div class="progress-fill" style="width:${d.occupancy}%;background:${d.color};"></div></div>
      </div>
    </div>
  `).join('');

  el.innerHTML=`<div class="dept-grid">${cards}</div>`;
}

/* ══════════════════════════════════════════════
   BOOTSTRAP
══════════════════════════════════════════════ */
(function init(){
  // try to restore session
  const sid=localStorage.getItem(SESS);
  if(sid){
    const user=loadUsers().find(u=>u.id===sid);
    if(user){currentUser=user;enterDashboard();return;}
  }
  lucide.createIcons();
})();
</script>
